[NEAT]
fitness_criterion      = max
fitness_threshold      = 99999
no_fitness_termination = False
pop_size               = 150
reset_on_extinction    = False

[DefaultGenome]
activation_default      = tanh
activation_mutate_rate  = 0.05
activation_options      = tanh

aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

bias_init_mean          = 0.0
bias_init_stdev         = 1.0
bias_max_value          = 30.0
bias_min_value          = -30.0
bias_mutate_power       = 0.5
bias_mutate_rate        = 0.7
bias_replace_rate       = 0.1

compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.5

# High structural connection probabilities to accelerate coordination paths
conn_add_prob           = 0.65
conn_delete_prob        = 0.20

enabled_default         = True
enabled_mutate_rate     = 0.02

feed_forward            = True
initial_connection      = full_nodirect

node_add_prob           = 0.40
node_delete_prob        = 0.15

# Automatically mapped by arena for biped setup
num_hidden              = 0
num_inputs  = 15
num_outputs = 8

response_init_mean      = 1.0
response_init_stdev     = 0.0
response_max_value      = 30.0
response_min_value      = -30.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0

weight_init_mean        = 0.0
weight_init_stdev       = 1.0
weight_max_value        = 30
weight_min_value        = -30
weight_mutate_power     = 0.5
weight_mutate_rate      = 0.80
weight_replace_rate     = 0.1

[DefaultSpeciesSet]
# Forced diversity threshold to break the 16m local plateau trap
compatibility_threshold = 1.8

[DefaultStagnation]
species_fitness_func = max
max_stagnation       = 8
species_elitism      = 2

[DefaultReproduction]
elitism            = 6
survival_threshold = 0.20
