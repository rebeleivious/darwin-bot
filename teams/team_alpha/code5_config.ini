[NEAT]
fitness_criterion      = max
fitness_threshold      = 99999
no_fitness_termination = False
pop_size               = 150
reset_on_extinction    = False

[DefaultGenome]
# Activation functions - tanh is ideal for continuous joint motor control (-1 to 1)
activation_default      = tanh
activation_mutate_rate  = 0.05
activation_options      = tanh

aggregation_default     = sum
aggregation_mutate_rate = 0.0
aggregation_options     = sum

# Node Bias Dynamics
bias_init_mean          = 0.0
bias_init_stdev         = 1.0
bias_max_value          = 30.0
bias_min_value          = -30.0
bias_mutate_power       = 0.5
bias_mutate_rate        = 0.7
bias_replace_rate       = 0.1

# Speciation Coefficients
compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient   = 0.5

# Structural Mutation Rates (Optimized for 300 generations)
# Slightly aggressive connection addition to discover complex leg-coordination patterns
conn_add_prob           = 0.60
conn_delete_prob        = 0.25

enabled_default         = True
enabled_mutate_rate     = 0.02

feed_forward            = True
initial_connection      = full_nodirect

# Node addition probabilities to allow the "brain" to grow complex hidden layers over time
node_add_prob           = 0.35
node_delete_prob        = 0.2

# Network Dimensions - MUST match the 4-legged physical sensor/motor counts perfectly
num_hidden              = 0
num_inputs  = 15
num_outputs = 8

response_init_mean      = 1.0
response_init_stdev     = 0.0
response_max_value      = 30.0
response_min_value      = -30.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0

# Connection Weight Dynamics
# High mutate rate ensures fine-tuning of motor angles once a good gait topology is found
weight_init_mean        = 0.0
weight_init_stdev       = 1.0
weight_max_value        = 30
weight_min_value        = -30
weight_mutate_power     = 0.6
weight_mutate_rate      = 0.85
weight_replace_rate     = 0.1

[DefaultSpeciesSet]
# CRITICAL: Lowered to 2.2 to force strict, diverse speciation boundaries.
# This prevents a mediocre "sliding" biped from dominating the pool, protecting innovative walkers.
compatibility_threshold = 2.2

[DefaultStagnation]
species_fitness_func = max
max_stagnation       = 25
species_elitism      = 3

[DefaultReproduction]
# Elitism keeps the top 5 elite performers entirely safe from mutation every generation
elitism            = 5
survival_threshold = 0.20
